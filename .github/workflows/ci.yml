name: CI

on:
  push:
    branches: [ main, "copilot/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Skills.sln

      - name: Build
        run: dotnet build Skills.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Skills.sln --no-build --configuration Release --verbosity normal
